<script type="module">
import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, addDoc,
  collection, getDocs, query, where, orderBy, limit, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ================================================================
// CONFIGURACIÓN FIREBASE — reemplazá con tu proyecto si cambia
// ================================================================
const firebaseConfig = {
  apiKey: "AIzaSyBxtbTZmNzxSh9YBWIwrGx0_i8x4LLFeHY",
  authDomain: "inventario-mantenimiento-unsl.firebaseapp.com",
  projectId: "inventario-mantenimiento-unsl",
  storageBucket: "inventario-mantenimiento-unsl.firebasestorage.app",
  messagingSenderId: "826226646451",
  appId: "1:826226646451:web:25ca28cb15a3dbf7603fc6"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ================================================================
// HELPERS FIRESTORE
// ================================================================
const ts    = () => Timestamp.now();
const withId = s => ({ id: s.id, ...s.data() });

async function getAll(col) {
  const snap = await getDocs(collection(db, col));
  return snap.docs.map(withId);
}
async function getOne(col, id) {
  const snap = await getDoc(doc(db, col, id));
  return snap.exists() ? { id: snap.id, ...snap.data() } : null;
}
async function addOne(col, data) {
  const ref = await addDoc(collection(db, col), { ...data, createdAt: ts(), updatedAt: ts() });
  return ref.id;
}
async function setOne(col, id, data) {
  await setDoc(doc(db, col, id), { ...data, updatedAt: ts() }, { merge: true });
}
async function updateOne(col, id, data) {
  await updateDoc(doc(db, col, id), { ...data, updatedAt: ts() });
}
async function deleteOne(col, id) {
  await deleteDoc(doc(db, col, id));
}

// ================================================================
// HELPERS DE CONVERSIÓN
// ================================================================
const toDate = v => {
  if (!v) return null;
  if (typeof v?.toDate === 'function') return v.toDate();
  if (v instanceof Date) return v;
  const d = new Date(v);
  return isNaN(d) ? null : d;
};
const toYmd = v => { const d = toDate(v); return d ? d.toISOString().slice(0,10) : ''; };
const toIso = v => { const d = toDate(v); return d ? d.toISOString() : ''; };
const normBool = (v, def=true) => {
  if (v === undefined || v === null || v === '') return def;
  if (typeof v === 'boolean') return v;
  if (typeof v === 'string') return ['true','1','si','sí','activo'].includes(v.toLowerCase());
  return !!v;
};
const pick = (obj, ...keys) => {
  for (const k of keys) if (obj && obj[k] !== undefined && obj[k] !== null) return obj[k];
  return undefined;
};

// ================================================================
// MAPPERS — normalizan datos desde Firestore a objetos limpios
// ================================================================
function mapCategory(r) {
  return {
    id:          r.id,
    nombre:      pick(r,'nombre','Nombre') || '',
    descripcion: pick(r,'descripcion','Descripción') || '',
    icono:       pick(r,'icono','Ícono') || '📦',
    activo:      normBool(pick(r,'activo','Activo'), true)
  };
}

function mapStaff(r) {
  const nombre   = pick(r,'nombre','Nombre') || '';
  const apellido = pick(r,'apellido','Apellido') || '';
  return {
    id:             r.id,
    nombre,
    apellido,
    nombreCompleto: pick(r,'nombreCompleto') || [nombre, apellido].filter(Boolean).join(' '),
    cargo:          pick(r,'cargo','Cargo') || '',
    sector:         pick(r,'sector','Sector') || '',
    telefono:       pick(r,'telefono','Teléfono') || '',
    email:          pick(r,'email','Email') || '',
    activo:         normBool(pick(r,'activo','Activo'), true)
  };
}

function mapSupplier(r) {
  return {
    id:       r.id,
    nombre:   pick(r,'nombre','Nombre') || '',
    cuit:     pick(r,'cuit','CUIT') || '',
    contacto: pick(r,'contacto','Contacto') || '',
    telefono: pick(r,'telefono','Teléfono') || '',
    email:    pick(r,'email','Email') || '',
    activo:   normBool(pick(r,'activo','Activo'), true)
  };
}

function mapItem(r) {
  const tipo  = pick(r,'tipo','Tipo') || 'consumible';
  const stock = Number(pick(r,'stockActual','stock','Stock actual','Stock') ?? 0);
  const catId = pick(r,'categoriaId') || '';
  const catNm = pick(r,'categoriaNombre','categoria','Categoría') || '';
  return {
    id:              r.id,
    nombre:          pick(r,'nombre','Nombre') || '',
    descripcion:     pick(r,'descripcion','Descripción') || '',
    tipo,
    categoriaId:     catId,
    categoria:       catNm,
    unidad:          pick(r,'unidad','Unidad') || 'unidad',
    ubicacion:       pick(r,'ubicacion','Ubicación') || '',
    stock,
    stockActual:     stock,
    stockMinimo:     Number(pick(r,'stockMinimo','stockMin','Stock mínimo') ?? 0),
    stockMaximo:     Number(pick(r,'stockMaximo','stockMax','Stock máximo') ?? 0),
    estado:          pick(r,'estado','Estado') || (tipo === 'reutilizable' ? 'disponible' : ''),
    nroPatrimonial:  pick(r,'nroPatrimonial','Nro Patrimonial') || '',
    nroSerie:        pick(r,'nroSerie','Nro Serie') || '',
    fechaVencimiento:toYmd(pick(r,'fechaVencimiento','Fecha Vencimiento')),
    observaciones:   pick(r,'observaciones','Observaciones') || '',
    activo:          normBool(pick(r,'activo','Activo'), true)
  };
}

function mapMovement(r) {
  return {
    id:             r.id,
    fecha:          toIso(pick(r,'createdAt','fecha')) || new Date().toISOString(),
    tipo:           pick(r,'tipo','Tipo') || '',
    articuloId:     pick(r,'itemId','articuloId') || '',
    articuloNombre: pick(r,'itemNombre','articuloNombre','articulo') || '',
    categoria:      pick(r,'categoriaNombre','categoria') || '',
    destinatario:   pick(r,'destinatarioNombre','destinatario') || '',
    cantidad:       Number(pick(r,'cantidad') ?? 0),
    proveedor:      pick(r,'proveedorNombre','proveedor') || '',
    usuario:        pick(r,'usuarioNombre','usuarioUsername','usuario') || '',
    observaciones:  pick(r,'observaciones','detalle','proposito') || ''
  };
}

function mapLoan(r) {
  const fi = toDate(pick(r,'fechaPrestamo','fechaInicio','createdAt')) || new Date();
  const fe = toDate(pick(r,'fechaDevolucionEsperada'));
  const fr = toDate(pick(r,'fechaDevolucionReal'));
  const vencido = !fr && fe ? fe < new Date() : false;
  const diasTranscurridos = Math.max(0, Math.floor((Date.now() - fi.getTime()) / 86400000));
  return {
    id:                      r.id,
    articuloId:              pick(r,'itemId','articuloId') || '',
    articuloNombre:          pick(r,'itemNombre','articuloNombre','articulo') || '',
    destinatario:            pick(r,'destinatarioNombre','destinatario') || '',
    fechaInicio:             fi.toISOString(),
    fechaDevolucionEsperada: toYmd(fe),
    fechaDevolucionReal:     toYmd(fr),
    estado:                  pick(r,'estado') || (fr ? 'devuelto' : 'activo'),
    vencido,
    diasTranscurridos,
    proposito:               pick(r,'proposito') || '',
    observaciones:           pick(r,'observaciones') || ''
  };
}

function mapAlert(r) {
  return {
    id:      r.id,
    tipo:    pick(r,'tipo') || 'info',
    nombre:  pick(r,'itemNombre','nombre','titulo') || '',
    detalle: pick(r,'detalle','mensaje') || '',
    fecha:   toIso(pick(r,'createdAt','fecha')) || new Date().toISOString(),
    leida:   normBool(pick(r,'leida'), false),
    nivel:   pick(r,'nivel') || ''
  };
}

function mapUser(r) {
  const email = pick(r,'email','Email') || '';
  return {
    id:       r.id,
    uid:      r.id,
    username: pick(r,'username') || (email ? email.split('@')[0] : r.id),
    nombre:   pick(r,'nombre','Nombre') || '',
    rol:      pick(r,'rol','Rol') || 'consulta',
    email,
    activo:   normBool(pick(r,'activo','Activo'), true)
  };
}

function mapAudit(r) {
  return {
    id:      r.id,
    fecha:   toIso(pick(r,'createdAt','fecha')) || new Date().toISOString(),
    accion:  pick(r,'accion') || '',
    detalle: typeof pick(r,'detalle') === 'string' ? pick(r,'detalle') : JSON.stringify(pick(r,'detalle') || {}),
    usuario: pick(r,'usuarioNombre','usuarioUsername','usuario') || ''
  };
}

// ================================================================
// RESOLUCIÓN DE CATEGORÍAS — robusto ante datos migrados legacy
// ================================================================
function buildCategoryResolver(categories) {
  const byId   = new Map();
  const byName = new Map();
  categories.forEach(c => {
    const m = mapCategory(c);
    if (m.id)     byId.set(m.id, m.nombre);
    if (c.legacyId) byId.set(c.legacyId, m.nombre);
    if (m.nombre) byName.set(m.nombre.trim().toLowerCase(), m.nombre);
  });
  return function resolve(item) {
    const byIdResult   = byId.get(item.categoriaId);
    if (byIdResult) return byIdResult;
    const rawName = (item.categoria || '').trim();
    const byNmResult = byName.get(rawName.toLowerCase());
    if (byNmResult) return byNmResult;
    return rawName || 'Sin categoría';
  };
}

// ================================================================
// AUDITORÍA
// ================================================================
async function audit(accion, detalle = '') {
  try {
    if (!window.currentUser) return;
    await addOne('audit_logs', {
      accion,
      detalle,
      usuarioUid:      window.currentUser.uid || '',
      usuarioUsername: window.currentUser.username || '',
      usuarioNombre:   window.currentUser.nombre || ''
    });
  } catch (e) { console.warn('audit fail', e); }
}

// ================================================================
// ALERTAS AUTOMÁTICAS
// ================================================================
async function createAlertIfNeeded(itemId, itemNombre, tipo, detalle) {
  // Evitar duplicados del mismo día
  const hoy = new Date().toDateString();
  const rows = (await getAll('alerts')).map(mapAlert);
  const yaExiste = rows.some(a =>
    !a.leida &&
    a.nombre === itemNombre &&
    a.tipo === tipo &&
    new Date(a.fecha).toDateString() === hoy
  );
  if (yaExiste) return;
  await addOne('alerts', { tipo, itemId, itemNombre, detalle, leida: false });
}

// ================================================================
// LOGIN FIREBASE
// ================================================================
window.doFirebaseLogin = async function(email, password) {
  const cred = await signInWithEmailAndPassword(auth, email, password);
  const snap = await getDoc(doc(db, 'users', cred.user.uid));
  if (!snap.exists()) throw new Error('Usuario no encontrado en la base de datos.');
  const userData = mapUser({ id: cred.user.uid, ...snap.data() });
  if (!userData.activo) throw new Error('Esta cuenta está inactiva.');
  window.currentUser = userData;
  return userData;
};

window.doFirebaseLogout = async function() {
  await signOut(auth);
  window.currentUser = null;
};

// ================================================================
// CREAR USUARIO SECUNDARIO (sin cerrar sesión actual)
// ================================================================
async function createFirebaseUser(email, password) {
  const secondary     = initializeApp(firebaseConfig, 'secondary-' + Date.now());
  const secondaryAuth = getAuth(secondary);
  try {
    const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
    return cred.user.uid;
  } finally {
    await deleteApp(secondary);
  }
}

// ================================================================
// OPERACIONES DE DATOS — todas las acciones del sistema
// ================================================================

// ── ARTÍCULOS ─────────────────────────────────────────────────
window.DB = {

  async getItems(filtros = {}) {
    const [itemDocs, catDocs] = await Promise.all([getAll('items'), getAll('categories')]);
    const resolve = buildCategoryResolver(catDocs);
    let items = itemDocs.map(r => {
      const m = mapItem(r);
      m.categoria = resolve(m);
      return m;
    });
    // Soft delete: excluir inactivos siempre por defecto
    items = items.filter(x => x.activo !== false);
    if (filtros.tipo)      items = items.filter(x => x.tipo === filtros.tipo);
    if (filtros.categoria) items = items.filter(x => x.categoria === filtros.categoria);
    if (filtros.estado)    items = items.filter(x => x.estado === filtros.estado);
    if (filtros.buscar) {
      const q = filtros.buscar.toLowerCase();
      items = items.filter(x =>
        x.nombre.toLowerCase().includes(q) ||
        x.descripcion.toLowerCase().includes(q) ||
        x.nroPatrimonial.toLowerCase().includes(q)
      );
    }
    return items.sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
  },

  async saveItem(data) {
    const isEdit = !!data.id;
    const payload = {
      nombre:          data.nombre || '',
      descripcion:     data.descripcion || '',
      tipo:            data.tipo || 'consumible',
      categoriaId:     data.categoriaId    || '',
      categoriaNombre: data.categoriaNombre || data.categoria || '',
      categoria:       data.categoriaNombre || data.categoria || '',
      unidad:          data.unidad || 'unidad',
      ubicacion:       data.ubicacion || '',
      nroPatrimonial:  data.nroPatrimonial || '',
      nroSerie:        data.nroSerie || '',
      fechaVencimiento:data.fechaVencimiento || null,
      observaciones:   data.observaciones || '',
      activo:          true
    };
    if (data.tipo === 'consumible') {
      payload.stockActual = isEdit ? undefined : Number(data.stockInicial ?? 0);
      payload.stockMinimo = Number(data.stockMinimo ?? 0);
      payload.stockMaximo = Number(data.stockMaximo ?? 0);
      if (isEdit) delete payload.stockActual;
    } else {
      payload.estado = isEdit ? data.estado : (data.estado || 'disponible');
    }
    if (isEdit) {
      if (data.tipo === 'consumible') delete payload.stockActual;
      await updateOne('items', data.id, payload);
      await audit('EDIT_ARTICULO', data.nombre);
      return { id: data.id };
    } else {
      const id = await addOne('items', payload);
      await audit('NEW_ARTICULO', data.nombre);
      if (data.tipo === 'consumible' && Number(data.stockInicial) > 0) {
        await DB.saveMovimiento({
          tipo: 'ingreso',
          articuloId: id,
          articuloNombre: data.nombre,
          categoria: data.categoria,
          destinatario: 'Carga inicial',
          cantidad: Number(data.stockInicial),
          observaciones: 'Stock inicial'
        });
      }
      return { id };
    }
  },

  async softDeleteItem(id, nombre) {
    await updateOne('items', id, { activo: false });
    await audit('DELETE_ARTICULO_SOFT', nombre || id);
  },

  // ── MOVIMIENTOS ───────────────────────────────────────────────
  async getMovimientos(filtros = {}) {
    const docs = await getAll('movements');
    let movs = docs.map(mapMovement).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
    if (filtros.tipo)          movs = movs.filter(m => m.tipo === filtros.tipo);
    if (filtros.articuloId)    movs = movs.filter(m => m.articuloId === filtros.articuloId);
    if (filtros.destinatario)  movs = movs.filter(m => m.destinatario.toLowerCase().includes(filtros.destinatario.toLowerCase()));
    if (filtros.desde)         movs = movs.filter(m => new Date(m.fecha) >= new Date(filtros.desde));
    if (filtros.hasta)         movs = movs.filter(m => new Date(m.fecha) <= new Date(filtros.hasta + 'T23:59:59'));
    if (filtros.limite)        movs = movs.slice(0, filtros.limite);
    return movs;
  },

  async _addMovement(payload) {
    await addOne('movements', {
      tipo:              payload.tipo,
      itemId:            payload.articuloId || '',
      itemNombre:        payload.articuloNombre || '',
      categoriaNombre:   payload.categoria || '',
      destinatarioNombre:payload.destinatario || '',
      cantidad:          Number(payload.cantidad ?? 1),
      proveedorNombre:   payload.proveedor || '',
      usuarioNombre:     window.currentUser?.nombre || '',
      usuarioUsername:   window.currentUser?.username || '',
      observaciones:     payload.observaciones || ''
    });
  },

  async saveMovimiento(data) {
    const itemDoc = await getOne('items', data.articuloId);
    if (!itemDoc) return { error: 'Artículo no encontrado' };
    const item = mapItem(itemDoc);
    const tipo  = data.tipo;
    const cant  = Number(data.cantidad ?? 1);

    if (item.tipo === 'consumible') {
      let nuevoStock = item.stock;
      if (tipo === 'ingreso')  nuevoStock += cant;
      if (tipo === 'entrega')  nuevoStock -= cant;
      if (nuevoStock < 0) return { error: `Stock insuficiente. Disponible: ${item.stock}` };
      await updateOne('items', item.id, { stockActual: nuevoStock });
      if (tipo === 'entrega') {
        if (nuevoStock === 0)
          await createAlertIfNeeded(item.id, item.nombre, 'stock_cero', 'Stock agotado');
        else if (nuevoStock <= item.stockMinimo)
          await createAlertIfNeeded(item.id, item.nombre, 'stock_minimo', `Stock: ${nuevoStock} / Mínimo: ${item.stockMinimo}`);
      }
    } else {
      if (tipo === 'prestamo') {
        if (item.estado !== 'disponible') return { error: `No disponible. Estado actual: ${item.estado}` };
        await updateOne('items', item.id, { estado: 'prestado' });
        const fechaDev = data.fechaDevolucionEsperada ? Timestamp.fromDate(new Date(data.fechaDevolucionEsperada)) : null;
        await addOne('loans', {
          itemId:                  item.id,
          itemNombre:              item.nombre,
          destinatarioNombre:      data.destinatario || '',
          fechaPrestamo:           ts(),
          fechaDevolucionEsperada: fechaDev,
          proposito:               data.proposito || '',
          observaciones:           data.observaciones || '',
          estado:                  'activo'
        });
      }
    }
    await DB._addMovement({ ...data, articuloNombre: item.nombre, categoria: item.categoria });
    await audit('MOVIMIENTO_' + tipo.toUpperCase(), item.nombre);
    return { ok: true };
  },

  // ── PRÉSTAMOS ─────────────────────────────────────────────────
  async getPrestamosActivos() {
    const docs  = await getAll('loans');
    const hoy   = new Date();
    return docs
      .map(mapLoan)
      .filter(l => l.estado === 'activo')
      .sort((a,b) => new Date(b.fechaInicio) - new Date(a.fechaInicio));
  },

  async registrarDevolucion(data) {
    const loanDoc = await getOne('loans', data.prestamoId);
    if (!loanDoc) return { error: 'Préstamo no encontrado' };
    const loan = mapLoan(loanDoc);
    const nuevoEstadoItem = data.novedad ? (data.estadoHerramienta || 'en_reparacion') : 'disponible';
    await updateOne('loans', data.prestamoId, {
      estado:              'devuelto',
      fechaDevolucionReal: ts(),
      observaciones:       data.observaciones || ''
    });
    await updateOne('items', loan.articuloId, { estado: nuevoEstadoItem });
    await DB._addMovement({
      tipo:          'devolucion',
      articuloId:    loan.articuloId,
      articuloNombre:loan.articuloNombre,
      destinatario:  loan.destinatario,
      cantidad:      1,
      observaciones: data.observaciones || ''
    });
    await audit('DEVOLUCION', loan.articuloNombre);
    return { ok: true };
  },

  async cambiarEstado(articuloId, nuevoEstado, observaciones) {
    if (!observaciones?.trim()) return { error: 'Observación obligatoria' };
    await updateOne('items', articuloId, { estado: nuevoEstado, observaciones });
    const itemDoc = await getOne('items', articuloId);
    const item = itemDoc ? mapItem(itemDoc) : { nombre: articuloId };
    await DB._addMovement({
      tipo:          'cambio_estado',
      articuloId,
      articuloNombre:item.nombre,
      cantidad:      1,
      observaciones: `→ ${nuevoEstado}: ${observaciones}`
    });
    await audit('CAMBIO_ESTADO', `${item.nombre} -> ${nuevoEstado}`);
    return { ok: true };
  },

  // ── CATEGORÍAS ────────────────────────────────────────────────
  async getCategorias(soloActivas = true) {
    const docs = await getAll('categories');
    let cats   = docs.map(mapCategory);
    if (soloActivas) cats = cats.filter(c => c.activo);
    return cats.sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
  },

  async saveCategoria(data) {
    const payload = {
      nombre:      data.nombre || '',
      descripcion: data.descripcion || '',
      icono:       data.icono || '📦',
      activo:      data.activo !== undefined ? !!data.activo : true
    };
    if (data.id) { await updateOne('categories', data.id, payload); await audit('EDIT_CAT', data.nombre); }
    else { await addOne('categories', payload); await audit('NEW_CAT', data.nombre); }
  },

  async deleteCategoria(id, nombre) {
    const allItemDocs = await getAll('items');
    const allItems    = allItemDocs.map(mapItem);
    const inUse       = allItems.filter(i =>
      i.categoriaId === id ||
      (i.categoria || '').toLowerCase() === (nombre || '').toLowerCase()
    );
    if (inUse.length) return { error: `No se puede eliminar: ${inUse.length} artículo(s) la usan (incluye inactivos)` };
    await deleteOne('categories', id);
    await audit('DELETE_CAT', nombre);
    return { ok: true };
  },

  // ── PERSONAL ──────────────────────────────────────────────────
  async getPersonal(soloActivos = true) {
    const docs  = await getAll('staff');
    let staff   = docs.map(mapStaff);
    if (soloActivos) staff = staff.filter(s => s.activo);
    return staff.sort((a,b) => a.nombreCompleto.localeCompare(b.nombreCompleto, 'es'));
  },

  async savePersonal(data) {
    const payload = {
      nombre:         data.nombre || '',
      apellido:       data.apellido || '',
      nombreCompleto: [data.nombre||'', data.apellido||''].filter(Boolean).join(' '),
      cargo:          data.cargo || '',
      sector:         data.sector || '',
      telefono:       data.telefono || '',
      email:          data.email || '',
      activo:         data.activo !== undefined ? !!data.activo : true
    };
    if (data.id) { await updateOne('staff', data.id, payload); await audit('EDIT_PERSONAL', payload.nombreCompleto); }
    else { await addOne('staff', payload); await audit('NEW_PERSONAL', payload.nombreCompleto); }
  },

  async deletePersonal(id, nombre) {
    await deleteOne('staff', id);
    await audit('DELETE_PERSONAL', nombre);
  },

  // ── PROVEEDORES ───────────────────────────────────────────────
  async getProveedores(soloActivos = true) {
    const docs = await getAll('suppliers');
    let provs  = docs.map(mapSupplier);
    if (soloActivos) provs = provs.filter(p => p.activo);
    return provs.sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
  },

  async saveProveedor(data) {
    const payload = {
      nombre:   data.nombre || '',
      cuit:     data.cuit || '',
      contacto: data.contacto || '',
      telefono: data.telefono || '',
      email:    data.email || '',
      activo:   data.activo !== undefined ? !!data.activo : true
    };
    if (data.id) { await updateOne('suppliers', data.id, payload); await audit('EDIT_PROV', data.nombre); }
    else { await addOne('suppliers', payload); await audit('NEW_PROV', data.nombre); }
  },

  async deleteProveedor(id, nombre) {
    await deleteOne('suppliers', id);
    await audit('DELETE_PROV', nombre);
  },

  // ── ALERTAS ───────────────────────────────────────────────────
  async getAlertas(soloNoLeidas = false) {
    const docs  = await getAll('alerts');
    let alerts  = docs.map(mapAlert).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
    if (soloNoLeidas) alerts = alerts.filter(a => !a.leida);
    return alerts;
  },

  async marcarAlertaLeida(id, todas = false) {
    if (todas) {
      const docs = await getAll('alerts');
      const pen  = docs.filter(d => !normBool(d.leida, false));
      await Promise.all(pen.map(d => updateOne('alerts', d.id, { leida: true })));
    } else {
      await updateOne('alerts', id, { leida: true });
    }
  },

  // ── USUARIOS ──────────────────────────────────────────────────
  async getUsuarios() {
    const docs = await getAll('users');
    return docs.map(mapUser).sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
  },

  async saveUsuario(data) {
    if (!data.email) return { error: 'El email es obligatorio' };
    if (data.id) {
      await updateOne('users', data.id, {
        username: data.username || data.email.split('@')[0],
        nombre:   data.nombre || '',
        rol:      data.rol || 'consulta',
        email:    data.email,
        activo:   data.activo !== undefined ? !!data.activo : true
      });
      await audit('EDIT_USUARIO', data.email);
      return { ok: true, message: 'Usuario actualizado' };
    }
    if (!data.password) return { error: 'Contraseña requerida para nuevo usuario' };
    const uid = await createFirebaseUser(data.email, data.password);
    await setOne('users', uid, {
      username: data.username || data.email.split('@')[0],
      nombre:   data.nombre || '',
      rol:      data.rol || 'consulta',
      email:    data.email,
      activo:   true
    });
    await audit('NEW_USUARIO', data.email);
    return { ok: true, message: 'Usuario creado' };
  },

  // ── CONFIGURACIÓN ─────────────────────────────────────────────
  async getConfig() {
    const snap = await getDoc(doc(db, 'settings', 'general'));
    if (!snap.exists()) return { nombreSistema:'Sistema de Pañol', institucion:'UNSL', emailAlertas:'', diasVencimiento:7, diasPrestamo:3 };
    const d = snap.data();
    return {
      nombreSistema:  d.nombreSistema || 'Sistema de Pañol',
      institucion:    d.nombreInstitucion || d.institucion || 'UNSL',
      emailAlertas:   d.emailAlertas || '',
      diasVencimiento:Number(d.diasAvisoVencimiento ?? d.diasVencimiento ?? 7),
      diasPrestamo:   Number(d.diasPrestamoDefault   ?? d.diasPrestamo   ?? 3)
    };
  },

  async saveConfig(data) {
    await setOne('settings', 'general', {
      nombreSistema:       data.nombreSistema || '',
      nombreInstitucion:   data.institucion || '',
      emailAlertas:        data.emailAlertas || '',
      diasAvisoVencimiento:Number(data.diasVencimiento ?? 7),
      diasPrestamoDefault: Number(data.diasPrestamo ?? 3)
    });
    await audit('SAVE_CONFIG', 'Configuración general');
  },

  // ── AUDITORÍA ─────────────────────────────────────────────────
  async getAuditoria() {
    const docs = await getAll('audit_logs');
    return docs.map(mapAudit).sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 200);
  },

  // ── DASHBOARD ─────────────────────────────────────────────────
  async getDashboard() {
    const [items, loans, movDocs, alertDocs] = await Promise.all([
      DB.getItems(),
      DB.getPrestamosActivos(),
      DB.getMovimientos({ limite: 10 }),
      DB.getAlertas(true)
    ]);
    const crit  = items.filter(i => i.tipo === 'consumible' && i.stock <= i.stockMinimo).length;
    const venc  = loans.filter(l => l.vencido).length;
    const movCat = {};
    const hoy   = new Date();
    const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
    const allMovs = await DB.getMovimientos({});
    allMovs.filter(m => new Date(m.fecha) >= inicioMes).forEach(m => {
      const cat = m.categoria || 'Sin categoría';
      movCat[cat] = (movCat[cat] || 0) + 1;
    });
    return {
      kpis: {
        totalArticulos:     items.length,
        stockCritico:       crit,
        prestamosActivos:   loans.length,
        prestamosVencidos:  venc,
        alertasPendientes:  alertDocs.length
      },
      ultimosMovimientos:       movDocs,
      movimientosPorCategoria:  movCat
    };
  },

  // ── REPORTES ──────────────────────────────────────────────────
  async getReporte(tipo, params = {}) {
    const [items, loans, movs] = await Promise.all([
      DB.getItems(),
      DB.getAll_loans(),
      DB.getMovimientos(params)
    ]);

    switch (tipo) {
      case 'stock_categoria': {
        const grp = {};
        items.forEach(i => {
          const cat = i.categoria || 'Sin categoría';
          if (!grp[cat]) grp[cat] = { consumibles:0, reutilizables:0, stockTotal:0 };
          if (i.tipo === 'consumible') { grp[cat].consumibles++; grp[cat].stockTotal += i.stock; }
          else grp[cat].reutilizables++;
        });
        return { headers:['Categoría','Consumibles','Reutilizables','Stock Total'],
          datos: Object.entries(grp).map(([categoria,v]) => ({ categoria, consumibles:v.consumibles, reutilizables:v.reutilizables, stockTotal:v.stockTotal })) };
      }
      case 'stock_critico': {
        const datos = items
          .filter(i => i.tipo === 'consumible' && i.stock <= i.stockMinimo)
          .map(i => ({ nombre:i.nombre, categoria:i.categoria, stock:i.stock, minimo:i.stockMinimo, estado:i.stock===0?'AGOTADO':'CRÍTICO' }));
        return { headers:['Nombre','Categoría','Stock','Mínimo','Estado'], datos };
      }
      case 'prestamos_activos': {
        const datos = loans
          .filter(l => l.estado === 'activo')
          .map(l => ({ articulo:l.articuloNombre, destinatario:l.destinatario, desde:toYmd(new Date(l.fechaInicio)), devolucionEsperada:l.fechaDevolucionEsperada, dias:l.diasTranscurridos, vencido:l.vencido?'SÍ':'No' }));
        return { headers:['Artículo','Destinatario','Desde','Dev.Esperada','Días','Vencido'], datos };
      }
      case 'prestamos_vencidos': {
        const datos = loans
          .filter(l => l.estado === 'activo' && l.vencido)
          .map(l => ({ articulo:l.articuloNombre, destinatario:l.destinatario, diasVencido:l.diasTranscurridos, devolucionEsperada:l.fechaDevolucionEsperada }));
        return { headers:['Artículo','Destinatario','Días Vencido','Dev.Esperada'], datos };
      }
      case 'movimientos_periodo': {
        let f = movs;
        if (params.desde) f = f.filter(m => new Date(m.fecha) >= new Date(params.desde));
        if (params.hasta) f = f.filter(m => new Date(m.fecha) <= new Date(params.hasta+'T23:59:59'));
        const datos = f.map(m => ({ fecha:toYmd(new Date(m.fecha)), tipo:m.tipo, articulo:m.articuloNombre, categoria:m.categoria, destinatario:m.destinatario, cantidad:m.cantidad, usuario:m.usuario }));
        return { headers:['Fecha','Tipo','Artículo','Categoría','Destinatario','Cantidad','Usuario'], datos };
      }
      case 'top_articulos': {
        const grp = {};
        movs.filter(m => m.tipo==='entrega'||m.tipo==='prestamo').forEach(m => { grp[m.articuloNombre] = (grp[m.articuloNombre]||0)+1; });
        const datos = Object.entries(grp).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([articulo,total]) => ({ articulo, total }));
        return { headers:['Artículo','Total'], datos };
      }
      case 'sin_movimiento': {
        const cutoff = Date.now() - 60*86400000;
        const used   = new Set(movs.filter(m => new Date(m.fecha).getTime()>=cutoff).map(m => m.articuloId));
        const datos  = items.filter(i => !used.has(i.id)).map(i => ({ articulo:i.nombre, categoria:i.categoria, tipo:i.tipo, ubicacion:i.ubicacion }));
        return { headers:['Artículo','Categoría','Tipo','Ubicación'], datos };
      }
      case 'multiples_prestamos': {
        const grp = {};
        loans.filter(l=>l.estado==='activo').forEach(l => { grp[l.destinatario]=(grp[l.destinatario]||0)+1; });
        const datos = Object.entries(grp).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1]).map(([destinatario,total]) => ({ destinatario, total }));
        return { headers:['Destinatario','Préstamos Activos'], datos };
      }
      default:
        return { headers:[], datos:[] };
    }
  },

  async getAll_loans() {
    return (await getAll('loans')).map(mapLoan);
  }
};

// Exponer para la UI
window.DB = window.DB;
window.firebaseReady = true;
</script>

.form-control{border:1px solid var(--border);border-radius:7px;padding:9px 13px;font-size:14px;color:var(--text);background:var(--white);transition:var(--transition);outline:none;width:100%}
.form-control:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,42,74,.08)}
.form-control:disabled{background:var(--bg);color:var(--text-muted)}
select.form-control{cursor:pointer}
textarea.form-control{resize:vertical;min-height:80px}
.form-hint{font-size:11px;color:var(--text-light);margin-top:2px}
.otro-field{display:none;flex-direction:column;gap:5px}
.otro-field.visible{display:flex;animation:slideDown .25s ease}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 18px;border-radius:7px;font-size:13.5px;font-weight:500;transition:var(--transition);border:none;cursor:pointer}
.btn-primary{background:var(--navy);color:white}
.btn-primary:hover{background:var(--navy-mid)}
.btn-gold{background:var(--gold);color:var(--navy-dark);font-weight:700}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{background:transparent;color:var(--navy);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg)}
.btn-danger{background:var(--danger);color:white}
.btn-danger:hover{background:#b91c1c}
.btn-success{background:var(--success);color:white}
.btn-success:hover{background:#15803d}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-icon{padding:7px;border-radius:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.filters-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
.filter-input{border:1px solid var(--border);border-radius:7px;padding:8px 13px;font-size:13px;background:white;outline:none;transition:var(--transition)}
.filter-input:focus{border-color:var(--navy)}
.filter-input.wide{min-width:220px}
.modal-overlay{position:fixed;inset:0;background:rgba(11,18,32,.65);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:scaleIn .25s ease}
.modal-lg{max-width:740px}
.modal-header{padding:22px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-radius:14px 14px 0 0}
.modal-header h3{font-size:19px;color:var(--navy)}
.modal-close{width:32px;height:32px;background:var(--bg);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-muted);transition:var(--transition);border:none;cursor:pointer}
.modal-close:hover{background:#fee2e2;color:var(--danger)}
.modal-body{padding:22px 24px}
.modal-footer{padding:16px 24px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--navy-dark);color:white;padding:12px 18px;border-radius:8px;font-size:13.5px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.25);pointer-events:all;animation:slideLeft .3s ease;max-width:320px;border-left:4px solid var(--gold)}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger);background:#450a0a}
.toast.warning{border-color:var(--warning)}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:inline-block}
.spinner-dark{border-color:rgba(27,42,74,.2);border-top-color:var(--navy)}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text-muted)}
.alert-item{background:white;border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;margin-bottom:8px}
.alert-item.unread{border-left:3px solid var(--danger)}
.alert-item.warn-orange{border-left:3px solid var(--warning)}
.alert-icon{font-size:22px;flex-shrink:0}
.alert-content{flex:1}
.alert-title{font-size:14px;font-weight:600;color:var(--navy)}
.alert-detail{font-size:12px;color:var(--text-muted);margin-top:3px}
.alert-date{font-size:11px;color:var(--text-light);margin-top:4px}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:20px}
.tab-btn{flex:1;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-muted);background:transparent;transition:var(--transition);text-align:center;border:none;cursor:pointer}
.tab-btn.active{background:white;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.quick-card{background:white;border:1px solid var(--border);border-radius:10px;padding:16px 12px;text-align:center;cursor:pointer;transition:var(--transition)}
.quick-card:hover{border-color:var(--navy);background:var(--bg);transform:translateY(-2px)}
.quick-card-icon{font-size:24px;margin-bottom:7px}
.quick-card-label{font-size:11px;font-weight:600;color:var(--navy);line-height:1.3}
.row-vencido{background:#fff1f1!important}
.row-vencido:hover{background:#ffe4e4!important}

/* ── ARTICLE SEARCH WIDGET ── */
.art-search-wrap{position:relative;display:flex;flex-direction:column;gap:6px}
.art-search-input{border:1px solid var(--border);border-radius:7px;padding:9px 13px 9px 36px;font-size:14px;color:var(--text);background:var(--white);transition:var(--transition);outline:none;width:100%}
.art-search-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,42,74,.08)}
.art-search-icon{position:absolute;left:12px;top:10px;font-size:14px;pointer-events:none;color:var(--text-muted)}
.art-search-dropdown{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:7px;box-shadow:var(--shadow-lg);z-index:50;max-height:220px;overflow-y:auto;display:none}
.art-search-dropdown.open{display:block}
.art-search-item{padding:9px 13px;font-size:13.5px;cursor:pointer;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid var(--border);transition:background .12s}
.art-search-item:last-child{border-bottom:none}
.art-search-item:hover,.art-search-item.highlighted{background:var(--bg)}
.art-search-item-name{font-weight:600;color:var(--navy)}
.art-search-item-meta{font-size:11px;color:var(--text-muted)}
.art-search-item.disabled-item{opacity:.5;cursor:not-allowed;pointer-events:none}
.art-search-empty{padding:12px 13px;font-size:13px;color:var(--text-muted);text-align:center}
.art-select-fallback{display:block;margin-top:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

@media(max-width:768px){
  :root{--sidebar-w:0px}
  .sidebar{transform:translateX(-260px);width:260px}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0}
  .topbar-hamburger{display:flex}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .form-grid,.form-grid-3{grid-template-columns:1fr}
  .page-content{padding:14px}
  .filters-bar{flex-direction:column;align-items:stretch}
  .filter-input{width:100%}
  thead{display:none}
  tbody tr{display:block;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;padding:10px}
  tbody td{display:flex;justify-content:space-between;padding:6px 0;border:none;font-size:13px}
  tbody td::before{content:attr(data-label);font-weight:600;color:var(--text-muted);font-size:11px;text-transform:uppercase}
  .topbar-actions .topbar-btn span{display:none}
  .modal{max-width:100%}
  .modal-footer{flex-direction:column-reverse}
  .toast-container{bottom:80px;right:12px;left:12px}
  .toast{max-width:100%}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
  .sidebar-overlay.open{display:block}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr}
  .quick-grid{grid-template-columns:repeat(2,1fr)}
}
</style>

<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🏪</div>
      <h1>Sistema de Pañol</h1>
      <p>Subsecretaría de Infraestructura · UNSL</p>
    </div>
    <div class="login-error" id="login-error"></div>
    <div class="login-field"><label>Email</label><input type="email" id="login-user" placeholder="tuemail@unsl.edu.ar" autocomplete="username"></div>
    <div class="login-field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()"><span id="login-btn-text">Ingresar al Sistema</span></button>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">🏪</div>
        <div class="sidebar-brand-text"><h2>Pañol</h2><p>Infraestructura · UNSL</p></div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-avatar" id="user-avatar">👤</div>
      <div class="sidebar-user-info"><p id="user-name">-</p><p id="user-role-label">-</p></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-logout"><button class="logout-btn" onclick="doLogout()"><span>🚪</span> Cerrar Sesión</button></div>
  </aside>
  <div class="main-content">
    <div class="topbar">
      <button class="topbar-hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title"><h2 id="page-title">Dashboard</h2><p id="page-subtitle">Resumen general del sistema</p></div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>

<!-- ===== TOASTS ===== -->
<div class="toast-container" id="toasts"></div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalIfOverlay(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header"><h3 id="modal-title">Modal</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ================================================================
// ESTADO GLOBAL DE LA UI
// ================================================================
let currentUser = null;
let currentPage = null;
let alertCount  = 0;
let appData     = { categorias:[], personal:[], proveedores:[], articulos:[] };

const ROLES = {
  admin:     { label:'Administrador',      emoji:'👑' },
  encargado: { label:'Encargado de Pañol', emoji:'🔑' },
  supervisor:{ label:'Supervisor',         emoji:'👁️' },
  consulta:  { label:'Consulta',           emoji:'🔍' }
};

const MENU = [
  { section:'Operaciones', items:[
    { id:'dashboard',         icon:'📊', label:'Dashboard',            roles:['admin','encargado','supervisor','consulta'] },
    { id:'movimiento-rapido', icon:'⚡', label:'Movimiento Rápido',    roles:['admin','encargado'] },
    { id:'catalogo',          icon:'📦', label:'Catálogo',             roles:['admin','encargado','supervisor','consulta'] },
    { id:'prestamos',         icon:'🔑', label:'Préstamos Activos',    roles:['admin','encargado','supervisor'] },
  ]},
  { section:'Inventario', items:[
    { id:'entregas',       icon:'📤', label:'Registrar Entrega',    roles:['admin','encargado'] },
    { id:'nuevo-prestamo', icon:'📋', label:'Registrar Préstamo',   roles:['admin','encargado'] },
    { id:'devolucion',     icon:'📥', label:'Registrar Devolución', roles:['admin','encargado'] },
    { id:'ingreso-stock',  icon:'📨', label:'Ingreso de Stock',     roles:['admin','encargado'] },
    { id:'historial',      icon:'📜', label:'Historial',            roles:['admin','encargado','supervisor'] },
  ]},
  { section:'Gestión', items:[
    { id:'alertas',  icon:'🔔', label:'Alertas',  roles:['admin','encargado','supervisor'], badge:true },
    { id:'reportes', icon:'📈', label:'Reportes', roles:['admin','encargado','supervisor'] },
  ]},
  { section:'Administración', items:[
    { id:'personal',      icon:'👥', label:'Personal',             roles:['admin','encargado'] },
    { id:'categorias',    icon:'🏷️', label:'Categorías',           roles:['admin'] },
    { id:'proveedores',   icon:'🏭', label:'Proveedores',          roles:['admin','encargado'] },
    { id:'usuarios',      icon:'🔐', label:'Usuarios del Sistema', roles:['admin'] },
    { id:'configuracion', icon:'⚙️', label:'Configuración',        roles:['admin'] },
    { id:'auditoria',     icon:'🔍', label:'Auditoría',            roles:['admin'] },
  ]}
];

// ================================================================
// AUTH
// ================================================================
async function doLogin() {
  const email    = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('login-error');
  if (!email || !password) { showLoginError('Ingresá email y contraseña'); return; }
  btn.disabled = true;
  document.getElementById('login-btn-text').innerHTML = '<div class="spinner"></div>';
  errEl.style.display = 'none';
  try {
    const user = await window.doFirebaseLogin(email, password);
    currentUser = user;
    sessionStorage.setItem('panol_user', JSON.stringify(user));
    initApp();
  } catch (e) {
    showLoginError(e.message || 'Error de autenticación');
  } finally {
    btn.disabled = false;
    document.getElementById('login-btn-text').textContent = 'Ingresar al Sistema';
  }
}
function showLoginError(msg) { const el=document.getElementById('login-error'); el.textContent=msg; el.style.display='block'; }

async function doLogout() {
  if (!confirm('¿Cerrar sesión?')) return;
  await window.doFirebaseLogout();
  currentUser = null;
  sessionStorage.removeItem('panol_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

// ================================================================
// INIT APP
// ================================================================
async function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const info = ROLES[currentUser.rol] || { label:currentUser.rol, emoji:'👤' };
  document.getElementById('user-name').textContent       = currentUser.nombre || currentUser.username;
  document.getElementById('user-role-label').textContent = info.label;
  document.getElementById('user-avatar').textContent     = info.emoji;
  buildMenu();
  await loadBaseData();
  await loadAlertCount();
  navigateTo('dashboard');
}

function buildMenu() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  MENU.forEach(section => {
    const items = section.items.filter(i => i.roles.includes(currentUser.rol));
    if (!items.length) return;
    const sec = document.createElement('div');
    sec.className = 'nav-section';
    sec.textContent = section.section;
    nav.appendChild(sec);
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'nav-item';
      el.dataset.page = item.id;
      el.innerHTML = `<span class="nav-icon">${item.icon}</span><span>${item.label}</span>`;
      if (item.badge) el.innerHTML += `<span class="nav-badge" id="badge-alertas" style="display:none">0</span>`;
      el.onclick = () => { navigateTo(item.id); closeSidebar(); };
      nav.appendChild(el);
    });
  });
}

async function loadBaseData() {
  const [cats, staff, provs] = await Promise.all([
    window.DB.getCategorias(true),
    window.DB.getPersonal(true),
    window.DB.getProveedores(true)
  ]);
  appData.categorias  = cats;
  appData.personal    = staff;
  appData.proveedores = provs;
}

async function loadAlertCount() {
  const alerts = await window.DB.getAlertas(true);
  alertCount = alerts.length;
  const b = document.getElementById('badge-alertas');
  if (b) { b.textContent = alertCount; b.style.display = alertCount > 0 ? 'inline-block' : 'none'; }
}

// ================================================================
// NAVEGACIÓN
// ================================================================
const PAGE_META = {
  'dashboard':         { title:'Dashboard',              subtitle:'Resumen en tiempo real' },
  'movimiento-rapido': { title:'Movimiento Rápido',       subtitle:'Registrá una operación en segundos' },
  'catalogo':          { title:'Catálogo de Artículos',   subtitle:'Inventario completo' },
  'prestamos':         { title:'Préstamos Activos',       subtitle:'Herramientas en circulación' },
  'entregas':          { title:'Registrar Entrega',       subtitle:'Entrega de consumibles' },
  'nuevo-prestamo':    { title:'Registrar Préstamo',      subtitle:'Préstamo de reutilizables' },
  'devolucion':        { title:'Registrar Devolución',    subtitle:'Devolución de herramientas' },
  'ingreso-stock':     { title:'Ingreso de Stock',        subtitle:'Recepción de materiales' },
  'historial':         { title:'Historial',               subtitle:'Registro completo de operaciones' },
  'alertas':           { title:'Alertas',                 subtitle:'Notificaciones del sistema' },
  'reportes':          { title:'Reportes',                subtitle:'Exportá datos e informes' },
  'personal':          { title:'Personal',                subtitle:'Gestión de destinatarios' },
  'categorias':        { title:'Categorías',              subtitle:'Organización del inventario' },
  'proveedores':       { title:'Proveedores',             subtitle:'Registro de proveedores' },
  'usuarios':          { title:'Usuarios del Sistema',    subtitle:'Accesos y roles' },
  'configuracion':     { title:'Configuración',           subtitle:'Parámetros del sistema' },
  'auditoria':         { title:'Auditoría',               subtitle:'Log de acciones críticas' },
};

function navigateTo(pageId) {
  currentPage = pageId;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === pageId));
  const m = PAGE_META[pageId] || { title:pageId, subtitle:'' };
  document.getElementById('page-title').textContent    = m.title;
  document.getElementById('page-subtitle').textContent = m.subtitle;
  document.getElementById('page-content').innerHTML    = `<div class="loading-overlay"><div class="spinner spinner-dark"></div><span>Cargando...</span></div>`;
  document.getElementById('topbar-actions').innerHTML  = '';
  const pages = {
    'dashboard':       renderDashboard,
    'movimiento-rapido':renderMovimientoRapido,
    'catalogo':        renderCatalogo,
    'prestamos':       renderPrestamos,
    'entregas':        renderEntregas,
    'nuevo-prestamo':  renderNuevoPrestamo,
    'devolucion':      renderDevolucion,
    'ingreso-stock':   renderIngresoStock,
    'historial':       renderHistorial,
    'alertas':         renderAlertas,
    'reportes':        renderReportes,
    'personal':        renderPersonal,
    'categorias':      renderCategorias,
    'proveedores':     renderProveedores,
    'usuarios':        renderUsuarios,
    'configuracion':   renderConfiguracion,
    'auditoria':       renderAuditoria
  };
  if (pages[pageId]) pages[pageId]();
  else showPage('<div class="card"><p>Página no disponible</p></div>');
}

// ================================================================
// ARTICLE SEARCH WIDGET
// ================================================================
// Genera un widget de búsqueda + select sincronizado para artículos.
// selectId: id del <select> oculto que el resto del sistema usa para leer el valor.
// articles: array de objetos artículo (con id, nombre, tipo, stock, estado, unidad).
// onSelect: callback opcional(artId) cuando el usuario elige un artículo.
// metaFn: función opcional(art) → string de metadatos a mostrar bajo el nombre.
function buildArticleSearch(containerId, articles, onSelect, metaFn) {
  const container = document.getElementById(containerId);
  if (!container) return;

  // Construir opciones del select (respetando el mismo formato original)
  let selectOpts = `<option value="">— Seleccioná artículo —</option>`;
  articles.forEach(a => {
    const extra = a.tipo === 'consumible' ? ` (Stock: ${a.stock})` : ` (${a.estado})`;
    selectOpts += `<option value="${a.id}">${escHtml(a.nombre)}${extra}</option>`;
  });

  const defaultMetaFn = (a) => {
    if (a.tipo === 'consumible') return `Stock: ${a.stock} ${a.unidad || ''} · ${escHtml(a.categoria || '')}`;
    return `${a.estado || ''} · ${escHtml(a.categoria || '')}`;
  };
  const getMetaStr = metaFn || defaultMetaFn;

  container.innerHTML = `
    <div class="art-search-wrap" id="${containerId}-wrap">
      <span class="art-search-icon">🔍</span>
      <input
        type="text"
        class="art-search-input"
        id="${containerId}-search"
        placeholder="Escribí para buscar artículo..."
        autocomplete="off"
      >
      <div class="art-search-dropdown" id="${containerId}-dd"></div>
    </div>
    <select class="form-control art-select-fallback" id="${containerId}-select" style="margin-top:6px">
      ${selectOpts}
    </select>
    <span class="form-hint">Buscá arriba o seleccioná del desplegable</span>
  `;

  const searchInput = document.getElementById(`${containerId}-search`);
  const dropdown    = document.getElementById(`${containerId}-dd`);
  const selectEl    = document.getElementById(`${containerId}-select`);

  function renderDropdown(filtered) {
    if (!filtered.length) {
      dropdown.innerHTML = `<div class="art-search-empty">Sin resultados</div>`;
    } else {
      dropdown.innerHTML = filtered.map(a => {
        const meta = getMetaStr(a);
        return `<div class="art-search-item" data-id="${a.id}" data-nombre="${escHtml(a.nombre)}">
          <span class="art-search-item-name">${escHtml(a.nombre)}</span>
          <span class="art-search-item-meta">${meta}</span>
        </div>`;
      }).join('');
      dropdown.querySelectorAll('.art-search-item').forEach(item => {
        item.addEventListener('mousedown', (e) => {
          e.preventDefault();
          const id     = item.dataset.id;
          const nombre = item.dataset.nombre;
          selectArticle(id, nombre);
        });
      });
    }
    dropdown.classList.add('open');
  }

  function selectArticle(id, nombre) {
    searchInput.value  = nombre;
    selectEl.value     = id;
    dropdown.classList.remove('open');
    // Disparar evento change en el select para que updateStockInfo funcione si está enlazado
    selectEl.dispatchEvent(new Event('change'));
    if (typeof onSelect === 'function') onSelect(id);
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { dropdown.classList.remove('open'); selectEl.value = ''; return; }
    const filtered = articles.filter(a =>
      a.nombre.toLowerCase().includes(q) ||
      (a.descripcion || '').toLowerCase().includes(q) ||
      (a.nroPatrimonial || '').toLowerCase().includes(q) ||
      (a.categoria || '').toLowerCase().includes(q)
    );
    renderDropdown(filtered);
  });

  searchInput.addEventListener('focus', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (q) {
      const filtered = articles.filter(a => a.nombre.toLowerCase().includes(q));
      renderDropdown(filtered);
    }
  });

  searchInput.addEventListener('blur', () => {
    setTimeout(() => dropdown.classList.remove('open'), 150);
  });

  // Sincronización select → search (si el usuario usa el desplegable)
  selectEl.addEventListener('change', () => {
    const selId = selectEl.value;
    if (!selId) { searchInput.value = ''; return; }
    const art = articles.find(a => a.id === selId);
    if (art) searchInput.value = art.nombre;
    if (typeof onSelect === 'function') onSelect(selId);
  });
}

let mrTab = 'entrega';
function setMRTab(tipo, btn) {
  mrTab = tipo;
  document.querySelectorAll('#mr-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const artsF = appData.articulos.filter(a =>
    tipo === 'entrega'  ? a.tipo === 'consumible' :
    tipo === 'prestamo' ? a.tipo === 'reutilizable' : true
  );

  const destField = tipo !== 'ingreso' ? `
    <div class="form-group"><label>Destinatario <span class="req">*</span></label>
      <select class="form-control" id="mr-dest" onchange="handleOtro(this,'mr-otro-wrap')">
        <option value="">— Seleccioná persona —</option>
        ${appData.personal.map(p => `<option value="${escHtml(p.nombreCompleto)}">${escHtml(p.nombreCompleto)} — ${escHtml(p.cargo)}</option>`).join('')}
        <option value="__otro__">➕ Otro (persona externa)</option>
      </select></div>
    <div class="otro-field" id="mr-otro-wrap">
      <label style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px">Nombre completo <span class="req">*</span></label>
      <input type="text" class="form-control" id="mr-otro" placeholder="Ej: Ing. Paula Ramírez">
    </div>` : `
    <div class="form-group"><label>Proveedor</label>
      <select class="form-control" id="mr-prov">
        <option value="">— Sin proveedor —</option>
        ${appData.proveedores.map(p => `<option value="${escHtml(p.nombre)}">${escHtml(p.nombre)}</option>`).join('')}
      </select></div>
    <div class="form-group"><label>Remito</label><input type="text" class="form-control" id="mr-remito" placeholder="REM-0042"></div>`;

  const cantField = tipo !== 'prestamo' ? `
    <div class="form-group"><label>Cantidad <span class="req">*</span></label><input type="number" class="form-control" id="mr-cant" min="1" value="1"></div>` : `
    <div class="form-group"><label>Fecha Devolución</label><input type="date" class="form-control" id="mr-fecha-dev" value="${getFutureDate(3)}"></div>
    <div class="form-group"><label>Propósito</label><input type="text" class="form-control" id="mr-proposito" placeholder="Ej: Reparación Edificio B"></div>`;

  // ── CAMBIO: reemplazar el <select> de artículo por el widget de búsqueda ──
  document.getElementById('mr-form').innerHTML = `
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Artículo <span class="req">*</span></label>
        <div id="mr-art-container"></div>
        <div id="mr-art-stock" style="margin-top:6px"></div>
      </div>
      ${destField}${cantField}
      <div class="form-group form-full"><label>Observaciones</label><input type="text" class="form-control" id="mr-obs" placeholder="Opcional"></div>
    </div>
    <div style="margin-top:20px"><button class="btn btn-gold" style="width:100%;padding:14px" id="mr-btn" onclick="submitMR()">✓ Confirmar ${tipo==='entrega'?'Entrega':tipo==='prestamo'?'Préstamo':'Ingreso'}</button></div>`;

  // Inicializar widget de búsqueda para mr-art
  buildArticleSearch('mr-art-container', artsF, (artId) => {
    // Actualizar info de stock al seleccionar
    const art = artsF.find(a => a.id === artId);
    const el  = document.getElementById('mr-art-stock');
    if (el && art && art.tipo === 'consumible') {
      el.innerHTML = getStockBadge(art.stock, art.stockMinimo);
    } else if (el) {
      el.innerHTML = art ? getEstadoBadge(art.estado) : '';
    }
  });
}

async function submitMR() {
  // Leer articuloId del select interno del widget
  const artId = getArticleSearchValue('mr-art-container');
  const obs   = document.getElementById('mr-obs')?.value || '';
  if (!artId) { toast('Seleccioná un artículo','error'); return; }

  let destinatario = '';
  if (mrTab !== 'ingreso') {
    const ds = document.getElementById('mr-dest')?.value;
    if (ds === '__otro__') {
      const otro = document.getElementById('mr-otro')?.value.trim();
      if (!otro) { toast('Ingresá el nombre del destinatario','error'); return; }
      destinatario = 'Otro: ' + otro;
    } else {
      destinatario = ds;
    }
    if (!destinatario) { toast('Seleccioná un destinatario','error'); return; }
  }

  const data = {
    tipo:        mrTab,
    articuloId:  artId,
    destinatario,
    observaciones: obs
  };
  if (mrTab === 'prestamo')     { data.fechaDevolucionEsperada = document.getElementById('mr-fecha-dev')?.value; data.proposito = document.getElementById('mr-proposito')?.value; data.cantidad = 1; }
  else if (mrTab === 'entrega') { data.cantidad = parseInt(document.getElementById('mr-cant')?.value) || 1; }
  else {
    data.cantidad  = parseInt(document.getElementById('mr-cant')?.value) || 1;
    data.proveedor = document.getElementById('mr-prov')?.value || '';
    data.remito    = document.getElementById('mr-remito')?.value || '';
    data.destinatario = 'Ingreso de stock';
  }

  const btn = document.getElementById('mr-btn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Registrando...';
  const res = await window.DB.saveMovimiento(data);
  btn.disabled = false; btn.textContent = '✓ Confirmar';

  if (res.ok) {
    toast('Operación registrada correctamente','success');
    appData.articulos = await window.DB.getItems();
    setMRTab(mrTab, null);
    await loadAlertCount();
  } else {
    toast(res.error || 'Error al registrar','error');
  }
}

function filtrarCatalogo() {
  const buscar = (document.getElementById('f-buscar')?.value || '').toLowerCase();
  const tipo   = document.getElementById('f-tipo')?.value   || '';
  const cat    = document.getElementById('f-cat')?.value    || '';
  const estado = document.getElementById('f-estado')?.value || '';

  let arts = appData.articulos;
  if (buscar) arts = arts.filter(a =>
    a.nombre.toLowerCase().includes(buscar) ||
    (a.descripcion || '').toLowerCase().includes(buscar) ||
    (a.nroPatrimonial || '').toLowerCase().includes(buscar)
  );
  if (tipo)   arts = arts.filter(a => a.tipo === tipo);
  if (cat)    arts = arts.filter(a => a.categoria === cat);
  if (estado) arts = arts.filter(a => a.estado === estado);

  const tbody = document.getElementById('catalogo-body');
  if (!tbody) return;

  if (!arts.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="table-empty">Sin artículos</td></tr>`;
    return;
  }

  tbody.innerHTML = arts.map(a => `<tr>
    <td data-label="Nombre"><strong>${escHtml(a.nombre)}</strong><br><span style="font-size:11px;color:var(--text-muted)">${escHtml(a.descripcion || '')}</span></td>
    <td data-label="Categoría"><span class="badge badge-navy">${escHtml(a.categoria)}</span></td>
    <td data-label="Tipo">${a.tipo === 'consumible' ? '<span class="badge badge-info">Consumible</span>' : '<span class="badge badge-gray">Reutilizable</span>'}</td>
    <td data-label="Stock/Estado">${a.tipo === 'consumible' ? getStockBadge(a.stock, a.stockMinimo) : getEstadoBadge(a.estado)}</td>
    <td data-label="Ubicación">${escHtml(a.ubicacion || '—')}</td>
    <td data-label="Nro Pat.">${escHtml(a.nroPatrimonial || '—')}</td>
    <td data-label="Acciones">${hasPermission(['admin','encargado']) ? `<div style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm btn-icon" onclick="openModalEditarArticulo('${a.id}')" title="Editar">✏️</button>
      ${a.tipo === 'reutilizable' ? `<button class="btn btn-outline btn-sm btn-icon" onclick="openModalCambiarEstado('${a.id}','${escHtml(a.nombre)}')" title="Estado">🔄</button>` : ''}
      <button class="btn btn-danger btn-sm btn-icon" onclick="confirmarEliminarArticulo('${a.id}','${escHtml(a.nombre)}')" title="Eliminar">🗑️</button>
    </div>` : ''}</td>
  </tr>`).join('');
}

async function confirmarEliminarArticulo(id, nombre) {
  if (!confirm(`¿Desactivar "${nombre}"?\n\nEl artículo quedará oculto en todo el sistema. El historial de movimientos se conserva.`)) return;
  await window.DB.softDeleteItem(id, nombre);
  toast('Artículo desactivado', 'success');
  appData.articulos = await window.DB.getItems();
  filtrarCatalogo();
}

async function renderHistorial() {
  setTopbarActions(`<button class="topbar-btn" onclick="exportHistorial()">⬇️ <span>Exportar CSV</span></button>`);
  const movs = await window.DB.getMovimientos({ limite: 200 });

  const TM = {
    ingreso:      { l:'Ingreso',      cl:'badge-success', i:'📨' },
    entrega:      { l:'Entrega',      cl:'badge-info',    i:'📤' },
    prestamo:     { l:'Préstamo',     cl:'badge-navy',    i:'📋' },
    devolucion:   { l:'Devolución',   cl:'badge-gray',    i:'📥' },
    cambio_estado:{ l:'Cambio Estado',cl:'badge-warning', i:'🔄' }
  };
  const rows = movs.map(m => {
    const t = TM[m.tipo] || { l:m.tipo, cl:'badge-gray', i:'📌' };
    return `<tr>
      <td data-label="Fecha">${formatDate(m.fecha)}</td>
      <td data-label="Tipo"><span class="badge ${t.cl}">${t.i} ${t.l}</span></td>
      <td data-label="Artículo"><strong>${escHtml(m.articuloNombre)}</strong></td>
      <td data-label="Categoría">${escHtml(m.categoria || '—')}</td>
      <td data-label="Destinatario">${escHtml(m.destinatario || '—')}</td>
      <td data-label="Cantidad">${m.cantidad || '—'}</td>
      <td data-label="Usuario">${escHtml(m.usuario)}</td>
      <td data-label="Obs." style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(m.observaciones || '—')}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="8" class="table-empty">Sin movimientos</td></tr>`;

  showPage(`
    <div class="filters-bar">
      <input type="text" class="filter-input wide" id="h-buscar" placeholder="🔍 Buscar..." oninput="filtrarHistorial()">
      <select class="filter-input" id="h-tipo" onchange="filtrarHistorial()">
        <option value="">Todos los tipos</option>
        <option value="ingreso">Ingreso</option>
        <option value="entrega">Entrega</option>
        <option value="prestamo">Préstamo</option>
        <option value="devolucion">Devolución</option>
        <option value="cambio_estado">Cambio Estado</option>
      </select>
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Fecha</th><th>Tipo</th><th>Artículo</th><th>Categoría</th><th>Destinatario</th><th>Cant.</th><th>Usuario</th><th>Observaciones</th></tr></thead>
      <tbody id="historial-body">${rows}</tbody>
    </table></div></div>`);
}
function filtrarHistorial() {
  const b = (document.getElementById('h-buscar')?.value || '').toLowerCase();
  const t = document.getElementById('h-tipo')?.value || '';
  document.querySelectorAll('#historial-body tr').forEach(tr => {
    const txt  = tr.textContent.toLowerCase();
    const tipo = tr.querySelector('.badge')?.textContent || '';
    tr.style.display = (!b || txt.includes(b)) && (!t || tipo.toLowerCase().includes(t)) ? '' : 'none';
  });
}
async function exportHistorial() {
  const rep = await window.DB.getReporte('movimientos_periodo');
  downloadCSV(buildCsv(rep.datos), 'historial_movimientos.csv');
  toast('CSV descargado','success');
}

async function renderAlertas() {

  const TI = {

    vencimiento:     { icon:'📆', label:'Vencimiento Próximo',  cl:'warn-orange' }
  };
  const renderList = arr => arr.map(a => {
    const t = TI[a.tipo] || { icon:'🔔', label:a.tipo, cl:'' };
    return `<div class="alert-item ${a.leida ? '' : t.cl}" id="alert-${a.id}">

    </div>`;
  }).join('');

  const noLeidas = alertas.filter(a => !a.leida);
  const leidas   = alertas.filter(a => a.leida);
  showPage(`
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><div class="card-title">🔴 Sin leer (${noLeidas.length})</div></div>
      ${noLeidas.length ? renderList(noLeidas) : '<p style="color:var(--text-muted);text-align:center;padding:20px">🎉 Sin alertas pendientes</p>'}

    ${leidas.length ? `<div class="card"><div class="card-header"><div class="card-title">Historial de alertas (${leidas.length})</div></div>${renderList(leidas)}</div>` : ''}`);
}

  );
  const rep = await window.DB.getReporte(tipo);
  if (!rep.datos.length) {
    document.getElementById('modal-body').innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">Sin datos para mostrar</p>';
    return;
  }
  document.getElementById('modal-box').classList.add('modal-lg');
  document.getElementById('modal-body').innerHTML = `<div class="table-wrap"><table>
    <thead><tr>${rep.headers.map(h => `<th>${escHtml(h)}</th>`).join('')}</tr></thead>
    <tbody>${rep.datos.map(row =>
      `<tr>${rep.headers.map(h => {
        const keys = Object.keys(row);
        const val  = row[keys[rep.headers.indexOf(h)]] ?? '';
        return `<td data-label="${escHtml(h)}">${escHtml(String(val))}</td>`;
      }).join('')}</tr>`
    ).join('')}</tbody>
  </table></div>`;
}

async function exportarReporte(tipo) {
  const rep = await window.DB.getReporte(tipo);
  if (!rep.datos.length) { toast('Sin datos para exportar','warning'); return; }
  downloadCSV(buildCsv(rep.datos), `${tipo}_${new Date().toISOString().slice(0,10)}.csv`);
  toast('CSV descargado','success');
}
