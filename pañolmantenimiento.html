      <div class="form-group form-full"><label>Observaciones</label><textarea class="form-control" id="am-obs"></textarea></div>
    </div>`, [
    { label:'Crear Artículo', class:'btn-gold', fn: async () => {
      const nombre  = document.getElementById('am-nombre').value.trim();
      const catSel  = document.getElementById('am-cat');
      const catId   = catSel.value;
      const catNom  = catSel.options[catSel.selectedIndex]?.dataset.nombre || '';
      const tipo    = document.getElementById('art-tipo-data').dataset.tipo;
      if (!nombre) { toast('El nombre es obligatorio','error'); return; }
      if (!catId)  { toast('La categoría es obligatoria','error'); return; }
      const data = {
        nombre, tipo,
        categoriaId:     catId,
        categoria:       catNom,
        categoriaNombre: catNom,
        descripcion:    document.getElementById('am-desc').value,
        unidad:         document.getElementById('am-unidad').value || 'unidad',
        ubicacion:      document.getElementById('am-ubicacion').value,
        nroPatrimonial: document.getElementById('am-patrimonio').value,
        nroSerie:       document.getElementById('am-serie').value,
        fechaVencimiento: document.getElementById('am-venc').value,
        observaciones:  document.getElementById('am-obs').value
      };
      if (tipo === 'consumible') {
        data.stockInicial = parseInt(document.getElementById('am-stock-inicial')?.value) || 0;
        data.stockMinimo  = parseInt(document.getElementById('am-stock-min')?.value)     || 0;
        data.stockMaximo  = parseInt(document.getElementById('am-stock-max')?.value)     || 0;
      }
      await window.DB.saveItem(data);
      toast('Artículo creado','success');
      closeModal();
      appData.articulos = await window.DB.getItems();
      renderCatalogo();
    }},
    { label:'Cancelar', class:'btn-outline', fn: closeModal }
  ], 'modal-lg');
  setArtTab('consumible', document.querySelector('#art-tabs .tab-btn'));
}

function setArtTab(tipo, btn) {
  document.getElementById('art-tipo-data').dataset.tipo = tipo;
  document.querySelectorAll('#art-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const extra = document.getElementById('am-extra');
  if (tipo === 'consumible') {
    extra.innerHTML = `
      <div class="form-group"><label>Stock inicial</label><input type="number" class="form-control" id="am-stock-inicial" min="0" value="0"></div>
      <div class="form-group"><label>Stock mínimo</label><input type="number" class="form-control" id="am-stock-min" min="0" value="0"><span class="form-hint">Genera alerta al llegar a este nivel</span></div>
      <div class="form-group"><label>Stock máximo</label><input type="number" class="form-control" id="am-stock-max" min="0" value="0"></div>`;
  } else {
    extra.innerHTML = '';
  }
}

// ================================================================
// MODAL EDITAR ARTÍCULO
// ================================================================
async function openModalEditarArticulo(id) {
  const art = appData.articulos.find(a => a.id === id);
  if (!art) return;
  const catOpts = appData.categorias.map(c =>
    `<option value="${escHtml(c.id)}" data-nombre="${escHtml(c.nombre)}"
      ${(art.categoriaId ? c.id === art.categoriaId : c.nombre === art.categoria) ? 'selected' : ''}>
      ${c.icono} ${escHtml(c.nombre)}
    </option>`
  ).join('');
  openModal('Editar Artículo', `
    <div class="form-grid">
      <div class="form-group form-full"><label>Nombre <span class="req">*</span></label><input type="text" class="form-control" id="em-nombre" value="${escHtml(art.nombre)}"></div>
      <div class="form-group form-full"><label>Descripción</label><input type="text" class="form-control" id="em-desc" value="${escHtml(art.descripcion||'')}"></div>
      <div class="form-group"><label>Categoría</label><select class="form-control" id="em-cat">${catOpts}</select></div>
      <div class="form-group"><label>Tipo</label><input type="text" class="form-control" value="${art.tipo}" disabled></div>
      <div class="form-group"><label>Unidad</label><input type="text" class="form-control" id="em-unidad" value="${escHtml(art.unidad||'')}"></div>
      <div class="form-group"><label>Ubicación</label><input type="text" class="form-control" id="em-ubicacion" value="${escHtml(art.ubicacion||'')}"></div>
      ${art.tipo === 'consumible' ? `
      <div class="form-group"><label>Stock mínimo</label><input type="number" class="form-control" id="em-stock-min" value="${art.stockMinimo||0}" min="0"></div>
      <div class="form-group"><label>Stock máximo</label><input type="number" class="form-control" id="em-stock-max" value="${art.stockMaximo||0}" min="0"></div>` : ''}
      <div class="form-group"><label>Nro Patrimonial</label><input type="text" class="form-control" id="em-patrimonio" value="${escHtml(art.nroPatrimonial||'')}"></div>
      <div class="form-group"><label>Nro Serie</label><input type="text" class="form-control" id="em-serie" value="${escHtml(art.nroSerie||'')}"></div>
      <div class="form-group"><label>Fecha Vencimiento</label><input type="date" class="form-control" id="em-venc" value="${escHtml(art.fechaVencimiento||'')}"></div>
      <div class="form-group form-full"><label>Observaciones</label><textarea class="form-control" id="em-obs">${escHtml(art.observaciones||'')}</textarea></div>
    </div>`, [
    { label:'Guardar', class:'btn-gold', fn: async () => {
      const nombre = document.getElementById('em-nombre').value.trim();
      if (!nombre) { toast('El nombre es obligatorio','error'); return; }
      const catSelE = document.getElementById('em-cat');
      const catIdE  = catSelE.value;
      const catNomE = catSelE.options[catSelE.selectedIndex]?.dataset.nombre || '';
      await window.DB.saveItem({
        id:              art.id,
        tipo:            art.tipo,
        nombre,
        descripcion:     document.getElementById('em-desc').value,
        categoriaId:     catIdE,
        categoria:       catNomE,
        categoriaNombre: catNomE,
        unidad:          document.getElementById('em-unidad').value,
        ubicacion:       document.getElementById('em-ubicacion').value,
        nroPatrimonial:  document.getElementById('em-patrimonio').value,
        nroSerie:        document.getElementById('em-serie').value,
        fechaVencimiento:document.getElementById('em-venc').value,
        observaciones:   document.getElementById('em-obs').value,
        stockMinimo:     parseInt(document.getElementById('em-stock-min')?.value || '0'),
        stockMaximo:     parseInt(document.getElementById('em-stock-max')?.value || '0'),
        estado:          art.estado
      });
      toast('Artículo actualizado','success');
      closeModal();
      appData.articulos = await window.DB.getItems();
      filtrarCatalogo();
    }},
    { label:'Cancelar', class:'btn-outline', fn: closeModal }
  ], 'modal-lg');
}

// ================================================================
// MODAL CAMBIAR ESTADO
// ================================================================
function openModalCambiarEstado(artId, artNombre) {
  openModal('Cambiar Estado de Artículo', `
    <div class="form-grid">
      <div class="form-group form-full"><label>Artículo</label><input type="text" class="form-control" value="${escHtml(artNombre)}" disabled></div>
      <div class="form-group form-full"><label>Nuevo estado <span class="req">*</span></label>
        <select class="form-control" id="cs-estado">
          <option value="disponible">✅ Disponible</option>
          <option value="en_reparacion">🔧 En reparación</option>
          <option value="fuera_servicio">🚫 Fuera de servicio</option>
          <option value="extraviado">❓ Extraviado</option>
        </select></div>
      <div class="form-group form-full"><label>Observación / Justificación <span class="req">*</span></label>
        <textarea class="form-control" id="cs-obs" placeholder="Ej: Motor quemado, enviado a taller externo..."></textarea>
        <span class="form-hint">Obligatorio siempre</span>
      </div>
    </div>`, [
    { label:'Cambiar Estado', class:'btn-gold', fn: async () => {
      const nuevoEstado = document.getElementById('cs-estado').value;
      const obs         = document.getElementById('cs-obs').value.trim();
      if (!obs) { toast('La observación es obligatoria','error'); return; }
      const res = await window.DB.cambiarEstado(artId, nuevoEstado, obs);
      if (res.ok) {
        toast('Estado actualizado','success');
        closeModal();
        appData.articulos = await window.DB.getItems();
        filtrarCatalogo();
      } else {
        toast(res.error,'error');
      }
    }},
    { label:'Cancelar', class:'btn-outline', fn: closeModal }
  ]);
}

// ================================================================
// UTILIDADES UI
// ================================================================
function showPage(html) { document.getElementById('page-content').innerHTML = html; }
function setTopbarActions(html) { document.getElementById('topbar-actions').innerHTML = html; }
function hasPermission(roles) { return currentUser && roles.includes(currentUser.rol); }

function handleOtro(sel, wrapId) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  if (sel.value === '__otro__') { wrap.classList.add('visible'); wrap.style.display = 'flex'; }
  else { wrap.classList.remove('visible'); wrap.style.display = 'none'; }
}
function updateStockInfo(sel, targetId) {
  const opt   = sel.options[sel.selectedIndex];
  const stock = opt.dataset.stock;
  const min   = opt.dataset.min;
  const el    = document.getElementById(targetId);
  if (!el || stock === undefined) return;
  el.innerHTML = getStockBadge(parseInt(stock), parseInt(min));
}
function getStockBadge(stock, min) {
  if (stock === 0)      return `<span class="stock-badge stock-agotado"><span class="stock-dot"></span>AGOTADO</span>`;
  if (stock <= min)     return `<span class="stock-badge stock-crit"><span class="stock-dot"></span>${stock} (mín: ${min})</span>`;
  if (stock <= min*1.5) return `<span class="stock-badge stock-min"><span class="stock-dot"></span>${stock} (mín: ${min})</span>`;
  return                       `<span class="stock-badge stock-ok"><span class="stock-dot"></span>${stock}</span>`;
}
function getEstadoBadge(estado) {
  const M = {
    disponible:    '<span class="badge badge-success">✅ Disponible</span>',
    prestado:      '<span class="badge badge-info">📋 Prestado</span>',
    en_reparacion: '<span class="badge badge-warning">🔧 En reparación</span>',
    fuera_servicio:'<span class="badge badge-danger">🚫 Fuera de servicio</span>',
    extraviado:    '<span class="badge" style="background:#ede9fe;color:#5b21b6">❓ Extraviado</span>',
  };
  return M[estado] || `<span class="badge badge-gray">${escHtml(estado)}</span>`;
}
function formatDate(d) {
  if (!d) return '—';
  const date = new Date(d);
  if (isNaN(date)) return String(d);
  return date.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function getFutureDate(days) {
  return new Date(Date.now() + days*24*60*60*1000).toISOString().split('T')[0];
}
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function buildCsv(rows) {
  if (!rows.length) return '';
  const headers = Object.keys(rows[0]);
  const escape  = v => { const s = String(v??''); return /[",;\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
  return [headers.join(';'), ...rows.map(r => headers.map(h => escape(r[h])).join(';'))].join('\n');
}
function downloadCSV(csv, filename) {
  const blob = new Blob(['\uFEFF' + csv], { type:'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href = url; a.download = filename || 'export.csv'; a.click(); URL.revokeObjectURL(url);
}

// ── MODAL ──
function openModal(title, bodyHtml, buttons, extraClass) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML   = bodyHtml;
  document.getElementById('modal-box').className    = 'modal' + (extraClass ? ' ' + extraClass : '');
  const footer = document.getElementById('modal-footer'); footer.innerHTML = '';
  (buttons || []).forEach(b => {
    const btn = document.createElement('button'); btn.className = 'btn ' + b.class; btn.textContent = b.label; btn.onclick = b.fn; footer.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal()           { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalIfOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// ── TOAST ──
function toast(msg, type = 'success') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div'); el.className = 'toast ' + type;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠';
  el.innerHTML = `<span>${icon}</span><span>${escHtml(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transform='translateX(30px)'; el.style.transition='all .3s'; setTimeout(() => el.remove(), 300); }, 3500);
}

// ── SIDEBAR MÓVIL ──
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
function closeSidebar()  { document.getElementById('sidebar').classList.remove('open');  document.getElementById('sidebar-overlay').classList.remove('open'); }

// ── TECLADO ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });
});

// ── RESTAURAR SESIÓN (Firebase revalida automáticamente) ──
(function() {
  const saved = sessionStorage.getItem('panol_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      if (currentUser?.id) initApp();
    } catch(e) {
      sessionStorage.removeItem('panol_user');
    }
  }
})();
</script>
